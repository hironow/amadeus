name: fileref_diff_check_en
version: "1"
description: >
  English file-reference diff check prompt. Instructs Claude to read eval files
  and score divergence axes for an incremental (diff-based) integrity check.
variables:
  eval_dir: Absolute path to the eval directory containing scored files
  pr_reviews_section: >-
    Pre-rendered section listing the pr_reviews.md file reference.
    Empty string when no PR reviews are available.
  linked_issues_section: >-
    Pre-rendered section with linked Linear Issue IDs and fetch instructions.
    Empty string when no linked issues exist.
  repeated_violations_section: >-
    Pre-rendered section listing repeated violation warnings.
    Empty string when no repeated violations exist.
  divergence_trend_section: >-
    Pre-rendered section showing divergence trend analysis.
    Empty string when no trend data is available.
template: |
  ## Context
  You are Amadeus, a post-merge integrity verification system.
  Evaluate how recent changes affect the codebase's alignment with its architectural intent.

  ## Eval Files (READ-ONLY)
  The following files contain evaluation data. Read ALL of them using the Read tool.
  These files are READ-ONLY — do NOT modify, move, or delete them.

  1. {eval_dir}/previous_scores.json
  2. {eval_dir}/diff.patch
  3. {eval_dir}/adrs.md
  4. {eval_dir}/dods.md
  {pr_reviews_section}
  Each file has a YAML front matter with `kind` and `read_only: true`.
  You MUST read ALL files before evaluating.
  Report which files you read via the `files_read` array in your response (use the `kind` values from each file's front matter).
  {linked_issues_section}{repeated_violations_section}{divergence_trend_section}## Task
  Evaluate how these changes affect each integrity axis.
  Score each axis 0-100 (0 = full compliance, 100 = full deviation).

  Also produce an **impact_radius** map: identify which areas of the codebase are affected by these changes and how.
  - "direct": Files/modules directly modified in the diff
  - "indirect": Files/modules that import or depend on directly changed code
  - "transitive": Files/modules further downstream that may be affected

  Output MUST be valid JSON matching this exact schema:
  {"files_read":["adrs","dods","diff","previous_scores"],"axes":{"adr_integrity":{"score":0,"details":""},"dod_fulfillment":{"score":0,"details":""},"dependency_integrity":{"score":0,"details":""},"implicit_constraints":{"score":0,"details":""}},"adr_alignment":[{"number":"0001","title":"ADR Title","score":0,"verdict":"compliant","reason":"one sentence"}],"impact_radius":[{"area":"path/to/file_or_module","impact":"direct|indirect|transitive","detail":"explanation"}],"capability_violations":[{"boundary":"boundary_name","description":"explanation","file":"path/to/file.go"}],"dmails":[{"description":"","detail":"","issues":[],"targets":[],"category":"design|implementation"}],"reasoning":""}

  For Capability Violations:
  - Report any code that directly crosses a capability boundary (e.g., calling external APIs without approved adapters, accessing shared state without proper interfaces).
  - Empty array if none detected.
  - `boundary`: the name of the capability boundary being violated.
  - `file`: the file where the violation occurs (if identifiable).

  For ADR Alignment:
  - Score each ADR in docs/adr/ individually against the diff.
  - Score 0 means the change is fully compliant with this ADR.
  - Score 100 means the change directly and fully violates the core decision.
  - verdict: "compliant" (score < 30), "partial" (30-69), "violated" (>= 70).
  - Empty array if no ADRs are available.

  For D-Mails:
  - Only generate D-Mails for actual issues found. Empty array if none.
  - Include `targets`: file/module paths affected by each D-Mail issue.
  - Classify each D-Mail as "design" or "implementation":
    - "design": ADR violations, dependency structure issues, architectural drift
    - "implementation": DoD gaps, coding convention violations, test coverage issues
  - Include the classification in the "category" field of each D-Mail candidate.
